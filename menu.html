<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Real Club de Polo de Barcelona</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8192C;
    --red-light: #ff4d5e;
    --red-dim: rgba(232,25,44,0.15);
    --blue: #1542E8;
    --blue-light: #4d6fff;
    --blue-dim: rgba(21,66,232,0.15);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.15);
    --bg: #0a0c10;
    --surface: #111318;
    --border: rgba(255,255,255,0.07);
    --text: #f0f2f8;
    --text-muted: #6b7280;
    --card-radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 48px 32px;
  }

  /* ── LOGO ── */
  .menu-logo {
    max-height: 440px;
    width: auto;
    display: block;
  }

  /* ── CARDS ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 860px;
    width: 100%;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 32px 28px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .card.red::before   { background: var(--red); }
  .card.blue::before  { background: var(--blue-light); }
  .card.green::before { background: var(--green); }
  .card:hover {
    border-color: rgba(255,255,255,0.14);
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 3px;
  }
  .card.red   .card-title { color: var(--red-light); }
  .card.blue  .card-title { color: var(--blue-light); }
  .card.green .card-title { color: var(--green); }
  .card-cta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    transition: color 0.2s;
  }
  .card:hover .card-cta { color: var(--text); }
</style>
</head>
<body>

<img src="/static/logo.png" class="menu-logo" alt="Real Club de Polo de Barcelona">

<div class="cards-grid">

  <a href="/accesos" class="card red">
    <div class="card-title">ACCESOS</div>
    <div class="card-cta">VER DASHBOARD →</div>
  </a>

  <a href="/pistas" class="card blue">
    <div class="card-title">PISTAS</div>
    <div class="card-cta">VER DASHBOARD →</div>
  </a>

  <a href="/tickets" class="card green">
    <div class="card-title">TICKETS</div>
    <div class="card-cta">VER DASHBOARD →</div>
  </a>

</div>

</body>
</html>
